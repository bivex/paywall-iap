version: '3.8'

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iap_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=iap_db
    ports:
      - "5432:5432"
    networks:
      - internal

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - internal

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/iap_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=0123456789abcdef0123456789abcdef

      - STRIPE_WEBHOOK_SECRET=whsec_dummy
      - APPLE_WEBHOOK_SECRET=whsec_dummy
      - GOOGLE_WEBHOOK_SECRET=whsec_dummy

      # Point Google IAP verifier at the local mock (override with real key in prod)
      - GOOGLE_IAP_BASE_URL=http://google-billing-mock:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      google-billing-mock:
        condition: service_healthy
    networks:
      - internal

  google-billing-mock:
    build:
      context: ../../tests/google-billing-mock
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    user: "0:0"
    ports:
      - "8090:8080"
    environment:
      - MOCK_SERVER_PORT=8080
      - MOCK_LOG_LEVEL=info
      - MOCK_METRICS_ENABLED=true
      - MOCK_MOCK_SCENARIOS_PATH=config/scenarios/default.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/worker/Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/iap_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=0123456789abcdef0123456789abcdef
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  migrator:
    build:
      context: ../../
      dockerfile: infra/docker/migrator/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/iap_db?sslmode=disable
      - JWT_SECRET=0123456789abcdef0123456789abcdef

    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal


networks:
  internal:
    driver: bridge
