openapi: 3.1.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: Paywall IAP API
  version: 1.0.0
  description: OpenAPI schema assembled from the current Gin router, handler DTOs, and advanced bandit endpoints.
servers:
  - url: /
tags:
  - name: system
  - name: auth
  - name: admin-auth
  - name: bandit
  - name: iap
  - name: subscription
  - name: admin
paths:
  /openapi.yaml:
    get:
      tags: [system]
      summary: Download the OpenAPI schema
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: object
                additionalProperties: true
  /health:
    get:
      tags: [system]
      summary: Service health check
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RootHealth'
  /v1/auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or revoked refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/auth/login:
    post:
      tags: [admin-auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Admin authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/auth/logout:
    post:
      tags: [admin-auth]
      summary: Admin logout
      responses:
        '200':
          description: Admin logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bandit/assign:
    post:
      tags: [bandit]
      summary: Assign user to experiment arm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRequest'
      responses:
        '200':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Experiment not found or has no arms
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bandit/impression:
    post:
      tags: [bandit]
      summary: Record impression for an arm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImpressionRequest'
      responses:
        '200':
          description: Impression recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImpressionEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Experiment or arm not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bandit/reward:
    post:
      tags: [bandit]
      summary: Record reward for an arm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RewardRequest'
      responses:
        '200':
          description: Reward recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RewardEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Experiment or arm not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bandit/statistics:
    get:
      tags: [bandit]
      summary: Get experiment statistics
      parameters:
        - name: statistics_query
          in: query
          required: true
          style: form
          explode: true
          schema:
            type: object
            required: [experiment_id]
            additionalProperties: false
            properties:
              experiment_id:
                type: string
                format: uuid
              win_probs:
                type: boolean
      responses:
        '200':
          description: Statistics fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatisticsEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/bandit/health:
    get:
      tags: [bandit]
      summary: Bandit service health check
      responses:
        '200':
          description: Bandit service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanditHealthEnvelope'
  /v1/bandit/currency/rates:
    get:
      tags: [bandit]
      summary: Get current currency rates
      responses:
        '200':
          description: Current rates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyRatesResponse'
        '503':
          description: Currency service unavailable
          content:
            text/plain:
              schema:
                type: string
  /v1/bandit/currency/update:
    post:
      tags: [bandit]
      summary: Trigger currency rate update
      responses:
        '200':
          description: Rates updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimestampedMessageResponse'
        '500':
          description: Failed to update rates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '503':
          description: Currency service unavailable
          content:
            text/plain:
              schema:
                type: string
  /v1/bandit/currency/convert:
    post:
      tags: [bandit]
      summary: Convert amount to USD
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConvertCurrencyRequest'
      responses:
        '200':
          description: Amount converted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvertCurrencyResponse'
        '400':
          description: Invalid input or conversion failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '503':
          description: Currency service unavailable
          content:
            text/plain:
              schema:
                type: string
  /v1/bandit/experiments/{id}/objectives:
    get:
      tags: [bandit]
      summary: Get objective scores for all arms
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: Objective scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectiveScoresResponse'
        '400':
          description: Invalid experiment ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/experiments/{id}/objectives/config:
    get:
      tags: [bandit]
      summary: Get objective configuration
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: Objective configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectiveConfigResponse'
        '400':
          description: Invalid experiment ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
    put:
      tags: [bandit]
      summary: Update objective configuration
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectiveConfigUpdateRequest'
      responses:
        '200':
          description: Objective configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectiveConfigUpdateResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '404':
          description: Experiment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/experiments/{id}/window/info:
    get:
      tags: [bandit]
      summary: Get sliding window information
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: Window information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowInfoResponse'
        '400':
          description: Invalid experiment ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/experiments/{id}/window/trim:
    post:
      tags: [bandit]
      summary: Trim sliding window events
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: Window trimmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExperimentMessageResponse'
        '400':
          description: Invalid experiment ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/experiments/{id}/window/events:
    get:
      tags: [bandit]
      summary: Export recent window events
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 9223372036854775807
      responses:
        '200':
          description: Window events exported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WindowEventsResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/conversions:
    post:
      tags: [bandit]
      summary: Process delayed conversion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessConversionRequest'
      responses:
        '200':
          description: Conversion processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessConversionResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/pending/{id}:
    get:
      tags: [bandit]
      summary: Get pending reward by ID
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Pending reward
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingReward'
        '400':
          description: Invalid pending reward ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '404':
          description: Pending reward not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/users/{id}/pending:
    get:
      tags: [bandit]
      summary: Get pending rewards for a user
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Pending rewards for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPendingRewardsResponse'
        '400':
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/experiments/{id}/metrics:
    get:
      tags: [bandit]
      summary: Get production metrics for an experiment
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: Metrics response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BanditMetrics'
        '400':
          description: Invalid experiment ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/bandit/maintenance:
    post:
      tags: [bandit]
      summary: Trigger maintenance tasks
      responses:
        '200':
          description: Maintenance completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleError'
  /v1/verify/iap:
    post:
      tags: [iap]
      summary: Verify in-app purchase receipt
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyIAPRequest'
      responses:
        '200':
          description: Receipt verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyIAPEnvelope'
        '400':
          description: Invalid request or receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Receipt could not be processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/subscription:
    get:
      tags: [subscription]
      summary: Get current subscription
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Subscription found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [subscription]
      summary: Cancel current subscription
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Subscription canceled
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No active subscription found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/subscription/access:
    get:
      tags: [subscription]
      summary: Check premium access
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Access check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessCheckEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/experiments:
    get:
      tags: [admin]
      summary: List experiments
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Experiment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminExperimentListEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [admin]
      summary: Create experiment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminExperimentRequest'
      responses:
        '201':
          description: Experiment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminExperimentEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/experiments/{id}:
    put:
      tags: [admin]
      summary: Update draft experiment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminExperimentRequest'
      responses:
        '200':
          description: Experiment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminExperimentEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Experiment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/admin/experiments/{id}/pause:
    post:
      tags: [admin]
      summary: Pause experiment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Experiment paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminExperimentEnvelope'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '422': { $ref: '#/components/responses/Error422' }
        '500': { $ref: '#/components/responses/Error500' }
  /v1/admin/experiments/{id}/resume:
    post:
      tags: [admin]
      summary: Resume experiment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Experiment resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminExperimentEnvelope'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '422': { $ref: '#/components/responses/Error422' }
        '500': { $ref: '#/components/responses/Error500' }
  /v1/admin/experiments/{id}/complete:
    post:
      tags: [admin]
      summary: Complete experiment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Experiment completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminExperimentEnvelope'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '422': { $ref: '#/components/responses/Error422' }
        '500': { $ref: '#/components/responses/Error500' }
  /v1/admin/experiments/{id}/confirm-winner:
    post:
      tags: [admin]
      summary: Confirm recommended experiment winner
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ExperimentId'
      responses:
        '200':
          description: Experiment completed using the current winner recommendation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminExperimentEnvelope'
        '400': { $ref: '#/components/responses/Error400' }
