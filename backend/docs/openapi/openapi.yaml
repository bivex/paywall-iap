  /webhook/google:
    post:
      tags: [webhooks]
      summary: Google webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleWebhookRequest'
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAckResponse'
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ExperimentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error422:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error500:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Meta:
      type: object
      required: [request_id, timestamp]
      properties:
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error:
          type: string
        message:
          type: string
        code:
          type: string
        meta:
          $ref: '#/components/schemas/Meta'
    RootHealth:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    MessagePayload:
      type: object
      required: [message]
      properties:
        message:
          type: string
    OkPayload:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
    RegisterRequest:
      type: object
      required: [platform_user_id, device_id, platform, app_version]
      additionalProperties: false
      properties:
        platform_user_id:
          type: string
          minLength: 1
          pattern: '^[^\x00]+$'
        device_id:
          type: string
          minLength: 1
          pattern: '^[^\x00]+$'
        platform:
          type: string
          enum: [ios, android]
        app_version:
          type: string
          minLength: 1
          pattern: '^[^\x00]+$'
        email:
          nullable: true
          oneOf:
            - type: string
              maxLength: 0
            - type: string
              minLength: 3
              pattern: '^[A-Za-z0-9](?:[A-Za-z0-9._%+-]{0,62}[A-Za-z0-9])?@[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?(?:\.[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?)*\.[A-Za-z]{2,}$'
    RegisterResponse:
      type: object
      required: [user_id, access_token, refresh_token, expires_in]
      properties:
        user_id: { type: string }
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in:
          type: integer
          format: int64
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          minLength: 50
          pattern: '^[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}$'
    RefreshTokenResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in:
          type: integer
          format: int64
    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          minLength: 1
          format: email
        password:
          type: string
          minLength: 6
    AdminLoginResponse:
      type: object
      required: [user_id, email, role, access_token, refresh_token, expires_in]
      properties:
        user_id: { type: string }
        email:
          type: string
          format: email
        role: { type: string }
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in:
          type: integer
          format: int64
    AdminLogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          minLength: 50
          pattern: '^[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}$'
    AssignRequest:
      type: object
      required: [experiment_id, user_id]
      properties:
        experiment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
    AssignResponse:
      type: object
      required: [experiment_id, user_id, arm_id, is_new]
      properties:
        experiment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        arm_id:
          type: string
          format: uuid
        is_new:
          type: boolean
    ImpressionRequest:
      type: object
      required: [experiment_id, arm_id, user_id]
      properties:
        experiment_id:
          type: string
          format: uuid
        arm_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true
    ImpressionResponse:
      type: object
      required: [experiment_id, arm_id, user_id, tracked]
      properties:
        experiment_id:
          type: string
          format: uuid
        arm_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        tracked:
          type: boolean
    RewardRequest:
      type: object
      required: [experiment_id, arm_id, user_id, reward]
      properties:
        experiment_id:
          type: string
          format: uuid
        arm_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        reward:
          type: number
        currency:
          type: string
    RewardResponse:
      type: object
      required: [experiment_id, arm_id, reward, updated]
      properties:
        experiment_id:
          type: string
          format: uuid
        arm_id:
          type: string
          format: uuid
        reward:
          type: number
        updated:
          type: boolean
    ArmStatistics:
      type: object
      required: [arm_id, alpha, beta, samples, conversions, revenue, avg_reward, conversion_rate]
      properties:
        arm_id:
          type: string
          format: uuid
        alpha: { type: number }
        beta: { type: number }
        samples: { type: integer }
        conversions: { type: integer }
        revenue: { type: number }
        avg_reward: { type: number }
        conversion_rate: { type: number }
    StatisticsResponse:
      type: object
      required: [experiment_id, arms]
      properties:
        experiment_id:
          type: string
          format: uuid
        arms:
          type: array
          items:
            $ref: '#/components/schemas/ArmStatistics'
        win_probabilities:
          type: object
          additionalProperties:
            type: number
    BanditHealthPayload:
      type: object
      required: [status, service]
      properties:
        status: { type: string }
        service: { type: string }
    ConvertCurrencyRequest:
      type: object
      required: [amount, currency]
      additionalProperties: false
      properties:
        amount:
          type: number
          minimum: -1000000000
          maximum: 1000000000
        currency:
          type: string
          minLength: 1
          enum: [USD, EUR, GBP, JPY, CAD, AUD, CHF, CNY, INR, BRL, KRW]
    ConvertCurrencyResponse:
      type: object
      required: [original_amount, original_currency, converted_amount, target_currency]
      properties:
        original_amount: { type: number }
        original_currency: { type: string }
        converted_amount: { type: number }
        target_currency: { type: string }
    CurrencyRatesResponse:
      type: object
      required: [base, rates, updated]
      properties:
        base: { type: string }
        rates:
          type: object
          additionalProperties:
            type: number
        updated:
          type: string
          format: date-time
    TimestampedMessageResponse:
      type: object
      required: [message, updated]
      properties:
        message: { type: string }
        updated:
          type: string
          format: date-time
    MaintenanceResponse:
      type: object
      required: [message, timestamp]
      properties:
        message: { type: string }
        timestamp:
          type: string
          format: date-time
    ObjectiveConfigResponse:
      type: object
      required: [experiment_id, objective_type, weights]
      properties:
        experiment_id:
          type: string
          format: uuid
        objective_type:
          type: string
          enum: [conversion, ltv, revenue, hybrid]
        weights:
          type: object
          additionalProperties:
            type: number
    ObjectiveConfigUpdateRequest:
      type: object
      required: [objective_type, objective_weights]
      additionalProperties: false
      properties:
        objective_type:
          type: string
          enum: [conversion, ltv, revenue, hybrid]
        objective_weights:
          type: object
          minProperties: 1
          additionalProperties: false
          properties:
            conversion:
              type: number
              minimum: 0
            ltv:
              type: number
              minimum: 0
            revenue:
              type: number
              minimum: 0
          anyOf:
            - required: [conversion]
              properties:
                conversion:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
            - required: [ltv]
              properties:
                ltv:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
            - required: [revenue]
              properties:
                revenue:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
    ObjectiveConfigUpdateResponse:
      type: object
      required: [message, experiment_id, objective_type, weights]
      properties:
        message: { type: string }
        experiment_id:
          type: string
          format: uuid
        objective_type:
          type: string
          enum: [conversion, ltv, revenue, hybrid]
        weights:
          type: object
          additionalProperties:
            type: number
    ObjectiveScore:
      type: object
      required: [ObjectiveType, Score, Alpha, Beta, Samples, Conversions, Revenue, AvgLTV]
      properties:
        ObjectiveType: { type: string }
        Score: { type: number }
        Alpha: { type: number }
        Beta: { type: number }
        Samples: { type: integer }
        Conversions: { type: integer }
        Revenue: { type: number }
        AvgLTV: { type: number }
    ObjectiveScoreMap:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ObjectiveScore'
    ObjectiveScoresResponse:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/ObjectiveScoreMap'
    WindowStats:
      type: object
      required: [ArmID, Samples, Conversions, Revenue, Alpha, Beta, AvgReward, WindowStart, WindowEnd]
      properties:
        ArmID:
          type: string
          format: uuid
        Samples: { type: integer }
        Conversions: { type: integer }
        Revenue: { type: number }
        Alpha: { type: number }
        Beta: { type: number }
        AvgReward: { type: number }
        WindowStart:
          type: string
          format: date-time
        WindowEnd:
          type: string
          format: date-time
    WindowInfoResponse:
      type: object
      required: [experiment_id, windows]
      properties:
        experiment_id:
          type: string
          format: uuid
        windows:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/WindowStats'
    ExperimentMessageResponse:
      type: object
      required: [experiment_id, message]
      properties:
        experiment_id:
          type: string
          format: uuid
        message: { type: string }
    RewardEvent:
      type: object
      properties:
        UserID:
          type: string
          format: uuid
        ArmID:
          type: string
          format: uuid
        RewardValue: { type: number }
        Currency: { type: string }
        Timestamp:
          type: string
          format: date-time
        ConversionDelay:
          type: integer
          format: int64
          nullable: true
        Metadata:
          type: object
          nullable: true
          additionalProperties: true
    WindowEventsResponse:
      type: object
      required: [experiment_id, events, limit]
      properties:
        experiment_id:
          type: string
          format: uuid
        events:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/RewardEvent'
        limit:
          type: integer
          format: int64
    ProcessConversionRequest:
      type: object
      required: [transaction_id, user_id, conversion_value, currency]
      additionalProperties: false
      properties:
        transaction_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        conversion_value: { type: number }
        currency:
          type: string
          minLength: 1
          pattern: '^[A-Z]{3}$'
    ProcessConversionResponse:
      type: object
      required: [message, transaction_id]
      properties:
        message: { type: string }
        transaction_id:
          type: string
          format: uuid
    PendingReward:
      type: object
      required: [ID, ExperimentID, ArmID, UserID, AssignedAt, ExpiresAt, Converted, ConversionValue, ConversionCurrency]
      properties:
        ID:
          type: string
          format: uuid
        ExperimentID:
          type: string
          format: uuid
        ArmID:
          type: string
          format: uuid
        UserID:
          type: string
          format: uuid
        AssignedAt:
          type: string
          format: date-time
        ExpiresAt:
          type: string
          format: date-time
        Converted: { type: boolean }
        ConversionValue: { type: number }
        ConversionCurrency: { type: string }
        ConvertedAt:
          type: string
          format: date-time
          nullable: true
        ProcessedAt:
          type: string
          format: date-time
          nullable: true
    UserPendingRewardsResponse:
      type: object
      required: [user_id, rewards]
      properties:
        user_id:
          type: string
          format: uuid
        rewards:
          type: array
          items:
            $ref: '#/components/schemas/PendingReward'
    BanditMetrics:
      type: object
      properties:
        Regret: { type: number }
        ExplorationRate: { type: number }
        ConvergenceGap: { type: number }
        BalanceIndex: { type: number }
        WindowUtilization: { type: number }
        PendingRewards:
          type: integer
          format: int64
    VerifyIAPRequest:
      type: object
      required: [platform, receipt_data, product_id]
      additionalProperties: false
      properties:
        platform:
          type: string
          enum: [ios, android]
        receipt_data:
          type: string
          minLength: 1
          maxLength: 65536
        product_id:
          type: string
          minLength: 3
          maxLength: 200
          pattern: '^.+\..+$'
        transaction_id: { type: string }
    VerifyIAPResponse:
      type: object
      required: [subscription_id, status, expires_at, auto_renew, plan_type, is_new]
      properties:
        subscription_id: { type: string }
        status: { type: string }
        expires_at: { type: string }
        auto_renew: { type: boolean }
        plan_type: { type: string }
        is_new: { type: boolean }
    SubscriptionResponse:
      type: object
      required: [id, status, source, platform, product_id, plan_type, expires_at, auto_renew, created_at, updated_at]
      properties:
        id: { type: string }
        status: { type: string }
        source: { type: string }
        platform: { type: string }
        product_id: { type: string }
        plan_type: { type: string }
        expires_at: { type: string }
        auto_renew: { type: boolean }
        created_at: { type: string }
        updated_at: { type: string }
    AccessCheckResponse:
      type: object
      required: [has_access]
      properties:
        has_access: { type: boolean }
        expires_at: { type: string }
        reason: { type: string }
    CancelSubscriptionRequest:
      type: object
      properties:
        reason: { type: string }
    AutomationPolicy:
      type: object
      required: [enabled, auto_start, auto_complete, complete_on_end_time, complete_on_sample_size, complete_on_confidence, manual_override]
      properties:
        enabled: { type: boolean }
        auto_start: { type: boolean }
        auto_complete: { type: boolean }
        complete_on_end_time: { type: boolean }
        complete_on_sample_size: { type: boolean }
        complete_on_confidence: { type: boolean }
        manual_override: { type: boolean }
    AutomationPolicyInput:
      type: object
      properties:
        enabled:
          oneOf:
            - type: boolean
            - type: 'null'
        auto_start:
          oneOf:
            - type: boolean
            - type: 'null'
        auto_complete:
          oneOf:
            - type: boolean
            - type: 'null'
        complete_on_end_time:
          oneOf:
            - type: boolean
            - type: 'null'
        complete_on_sample_size:
          oneOf:
            - type: boolean
            - type: 'null'
        complete_on_confidence:
          oneOf:
            - type: boolean
            - type: 'null'
        manual_override:
          oneOf:
            - type: boolean
            - type: 'null'
        locked_until:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        locked_by:
          oneOf:
            - type: string
              format: uuid
            - type: 'null'
        lock_reason:
          oneOf:
            - type: string
            - type: 'null'
    CreateAdminExperimentControlArmRequest:
      allOf:
        - $ref: '#/components/schemas/CreateAdminExperimentArmRequest'
        - type: object
          properties:
            is_control:
              const: true
    CreateAdminExperimentVariantArmRequest:
      allOf:
        - $ref: '#/components/schemas/CreateAdminExperimentArmRequest'
        - type: object
          properties:
            is_control:
              const: false
    AdminExperimentArm:
      type: object
      required: [id, name, description, is_control, traffic_weight, samples, conversions, revenue, avg_reward]
      properties:
        id:
          type: string
          format: uuid
        name: { type: string }
        description: { type: string }
        is_control: { type: boolean }
        traffic_weight: { type: number }
        samples: { type: integer }
        conversions: { type: integer }
        revenue: { type: number }
        avg_reward: { type: number }
    AdminExperiment:
      type: object
      required: [id, name, description, status, is_bandit, min_sample_size, confidence_threshold_percent, automation_policy, created_at, updated_at, arm_count, total_assignments, active_assignments, total_samples, total_conversions, total_revenue, arms]
      properties:
        id:
          type: string
          format: uuid
        name: { type: string }
        description: { type: string }
        status: { type: string }
        algorithm_type:
          type: string
          nullable: true
        is_bandit: { type: boolean }
        min_sample_size: { type: integer }
        confidence_threshold_percent: { type: number }
        winner_confidence_percent:
          type: number
          nullable: true
        start_at:
          type: string
          format: date-time
          nullable: true
        end_at:
          type: string
          format: date-time
          nullable: true
        automation_policy:
