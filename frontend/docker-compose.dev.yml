services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: paywall-frontend-dev:latest
    container_name: paywall-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8081}
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:8081}
      - WATCHPACK_POLLING=true   # needed for file-watch inside Docker on macOS
    volumes:
      - .:/app                   # mount source → hot reload picks up changes
      - /app/node_modules        # keep container node_modules, don't override with host
      # NOTE: .next is NOT excluded — it lives inside the mounted /app so new routes
      # are picked up immediately without stale cache issues on macOS
    networks:
      - default
      - paywall_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default: {}
  paywall_internal:
    external: true
