services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: paywall-frontend-dev:latest
    container_name: paywall-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - BACKEND_URL=${BACKEND_URL:-http://api:8080}
      - WATCHPACK_POLLING=true   # needed for file-watch inside Docker on macOS
    volumes:
      - .:/app                   # mount source → hot reload picks up changes
      - /app/node_modules        # keep container node_modules, don't override with host
      - /app/.next               # keep .next build cache inside container
    networks:
      - default
      - docker-compose_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default: {}
  docker-compose_internal:
    external: true
