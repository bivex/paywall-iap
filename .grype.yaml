# Grype configuration for paywall-iap
# Suppress known npm-internal false positives (bundled inside npm itself,
# not in application code — not directly exploitable by app consumers)
ignore:
  # npm bundles its own tar/glob — upgradeable only via Node.js version
  - vulnerability: GHSA-34x7-hfp2-rc4v
    package:
      location: "/usr/local/lib/node_modules/npm/**"
  - vulnerability: GHSA-83g3-92jg-28cx
    package:
      location: "/usr/local/lib/node_modules/npm/**"
  - vulnerability: GHSA-8qq5-rm4j-mr97
    package:
      location: "/usr/local/lib/node_modules/npm/**"
  - vulnerability: GHSA-r6q2-hw4h-h46w
    package:
      location: "/usr/local/lib/node_modules/npm/**"
  - vulnerability: GHSA-5j98-mcp5-4vw2
    package:
      location: "/usr/local/lib/node_modules/npm/**"
  - vulnerability: GHSA-73rr-hh4g-fpgx
    package:
      location: "/usr/local/lib/node_modules/npm/**"
  # npm 11 bundles minimatch 10.1.x — fixed only in newer npm releases
  - vulnerability: GHSA-3ppc-4f35-3m26
    package:
      location: "/usr/local/lib/node_modules/npm/**"
  - vulnerability: GHSA-7r86-cg39-jmmj
    package:
      location: "/usr/local/lib/node_modules/npm/**"
  - vulnerability: GHSA-23c5-xmqv-rm74
    package:
      location: "/usr/local/lib/node_modules/npm/**"
